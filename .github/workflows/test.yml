name: Tests

on:
  push:
    branches: [main]
  pull_request:
  # Allow other workflows (e.g. docker-publish) to require this as a gate.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile
        run: python -m py_compile qbt_flow.py test_qbt_flow.py

      - name: Run tests (stdlib only, no dependencies)
        run: python -m unittest test_qbt_flow -v
